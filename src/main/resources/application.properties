spring.application.name=flows-camunda-7
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console
spring.main.allow-bean-definition-overriding=true

camunda.bpm.database.schema-update=true
camunda.bpm.admin-user.id=demo
camunda.bpm.admin-user.password=demo
camunda.bpm.admin-user.firstName=Demo
camunda.bpm.filter.create=All tasks
camunda.bpm.webapp.application-path=/camunda
camunda.bpm.webapp.index-redirect-enabled=false

# Disable Vaadin dev mode to avoid frontend build issues
vaadin.productionMode=false
vaadin.exclude-urls=/camunda/**, /engine-rest/**
